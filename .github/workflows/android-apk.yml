name: Build Android APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Web App
        run: npm run build
        env:
          VITE_GITHUB_TOKEN: ${{ secrets.VITE_GITHUB_TOKEN }}

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Build with Gradle
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Prepare APK Folder
        run: |
          mkdir -p apk-release
          cp android/app/build/outputs/apk/debug/app-debug.apk apk-release/jamui-supermart.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: apk-release/jamui-supermart.apk

      - name: Update Direct Download APK [skip ci]
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apk-release
          publish_branch: android-build
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: "Update Direct Download APK [skip ci]"
